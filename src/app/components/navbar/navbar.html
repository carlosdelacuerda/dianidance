<nav class="fixed top-0 w-full z-50 bg-bg-soft backdrop-blur-md border-b border-gray-100">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-20 items-center">

      <div class="flex-shrink-0 flex items-center">
        <a routerLink="/" class="flex items-center">
          <img src="/images/logo.svg" alt="Diani Dance" class="h-12 w-auto">
        </a>
      </div>

      <div class="hidden md:flex space-x-8 items-center">
        @for (link of navLinks; track link.path) {
        <a [routerLink]="link.path" routerLinkActive="text-brand-primary border-b-2 border-brand-primary"
          [routerLinkActiveOptions]="{exact: link.path === '/'}"
          class="text-sm font-medium text-gray-600 hover:text-brand-primary transition-colors pb-1">
          {{ link.label }}
        </a>
        }
        <a routerLink="/booking"
          class="ml-4 bg-brand-primary text-white px-6 py-2 rounded-full text-sm font-bold hover:bg-brand-secondary transition-all shadow-md hover:shadow-lg">
          BOOK NOW
        </a>
      </div>

      <div class="md:hidden flex items-center">
        <button (click)="toggleMenu()" class="text-gray-600 focus:outline-none">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            @if (!isMenuOpen()) {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            } @else {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            }
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="md:hidden transition-all duration-300" [class.hidden]="!isMenuOpen()">
    <div class="px-2 pt-2 pb-3 space-y-1 bg-white border-b border-gray-100 shadow-xl">
      @for (link of navLinks; track link.path) {
      <a [routerLink]="link.path" routerLinkActive="bg-brand-primary text-white" (click)="isMenuOpen.set(false)"
        class="block px-3 py-4 text-base font-medium text-gray-600 hover:bg-gray-50 hover:text-brand-primary rounded-md transition-colors">
        {{ link.label }}
      </a>
      }
      <div class="pt-4 pb-2 px-3">
        <a routerLink="/booking" (click)="isMenuOpen.set(false)"
          class="block text-center bg-brand-primary text-white px-6 py-3 rounded-xl font-bold">
          BOOK NOW
        </a>
      </div>
    </div>
  </div>
</nav>

<div class="h-20"></div>
